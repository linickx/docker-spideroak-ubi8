name: Docker Image CI

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'Message to print'
        required: false
        default: 'No message provided'
jobs:
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    # continue-on-error: true
    strategy:
      matrix:
        name: ["ubi8", "ubi10", "trixie"]
      fail-fast: false
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - run: |
             if [[ "${{ matrix.name }}" == "trixie" ]]; then
             cat spideroak-deb-2016.asc | gpg --dearmor | tee spideroak.gpg > /dev/null
             fi
      - name: Build the Docker image
        run: docker build . --file Dockerfile.${{ matrix.name }} -t ${{ vars.DOCKERHUB_USERNAME }}/spideroak-${{ matrix.name }}:latest
      - name: Test the image
        run: docker run --rm --entrypoint=/usr/bin/SpiderOakONE ${{ vars.DOCKERHUB_USERNAME }}/spideroak-${{ matrix.name }}:latest --version
      - name: Scan image
        uses: anchore/scan-action@v7
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/spideroak-${{ matrix.name }}:latest
          fail-build: false
          output-format: table
          output-file: grype.txt
      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/spideroak-${{ matrix.name }}:latest
          format: spdx-json
          output-file: SBOM.${{ matrix.name }}.spdx.json
      - name: Write SCAN Report
        run: |
            cat .github/SCAN-Template.md > "SCAN.${{ matrix.name }}.md"
            echo >> "SCAN.${{ matrix.name }}.md"
            echo "---" >> "SCAN.${{ matrix.name }}.md"
            date +'%m-%d-%Y %T' >> "SCAN.${{ matrix.name }}.md"
            echo "---" >> "SCAN.${{ matrix.name }}.md"
            echo '```' >> "SCAN.${{ matrix.name }}.md"
            cat grype.txt >> "SCAN.${{ matrix.name }}.md"
            echo '```' >> "SCAN.${{ matrix.name }}.md"
      - run: rm -f grype.txt
      - name: Sleep to avoid git clashes
        run: |
             if [[ "${{ matrix.name }}" == "trixie" ]]; then
             sleep 10
             elif [[ "${{ matrix.name }}" == "ubi10" ]]; then
             sleep 20
             fi
      - name: Upload SBOM & SCAN to git
        run: |
            git config --global user.name "${{ github.actor }}"
            git config --global user.email "${{ github.actor }}@users.noreply.github.com"
            git pull
            git add "SCAN.${{ matrix.name }}.md" "SBOM.${{ matrix.name }}.spdx.json"
            git commit -m "SBOM & SCAN Report $(date +'%m-%d-%Y %T')"
            git push
      - name: SBOM upload to GitHub API
        uses: advanced-security/spdx-dependency-submission-action@v0.2.0
        with:
          filePath: ./
      - name: Login to DockerHub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/spideroak-${{ matrix.name }}:latest
      - name: Logout from Docker Hub
        if: github.ref == 'refs/heads/main'
        run: docker logout
